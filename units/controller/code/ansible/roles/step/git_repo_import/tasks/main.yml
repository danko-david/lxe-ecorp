
- name: Ensure GitLab group {{ repo.path }} exists
  community.general.gitlab_group:
    api_url: "http://gitlab.{{ ECORP_DNS_CORE_ZONE_NAME }}"
    api_token: "SUPER_SECRET_ROOT_TOKEN"
    name: "{{ repo.path }}"
    path: "{{ repo.path }}"
    state: present
    visibility: public
    validate_certs: false

- name: Clone or pull latest commits from {{ repo.url }}
  shell: |
    set -ex
    mkdir -p '/ecorp/data/controller/last_imports/git_import/{{ repo.path }}'
    cd '/ecorp/data/controller/last_imports/git_import/{{ repo.path }}'
    if [ -d '{{ repo.repo }}' ]
    then
      cd '{{ repo.repo }}'
      git fetch --all --prune
    else
      git clone --mirror '{{ repo.url }}' '{{ repo.repo }}'
    fi

- name: Push commits to gitlab http://gitlab.{{ ECORP_DNS_CORE_ZONE_NAME }}/{{ repo.path }}/{{ repo.repo }}
  shell: |
    set -ex
    export GIT_TERMINAL_PROMPT=0
    cd '/ecorp/data/controller/last_imports/git_import/{{ repo.path }}/{{ repo.repo }}'
    git push --mirror http://gitlab.{{ ECORP_DNS_CORE_ZONE_NAME }}/{{ repo.path }}/{{ repo.repo }}

- name: Set GitLab project {{ repo.path }}/{{ repo.repo }} visibility to public
  community.general.gitlab_project:
    api_url: "http://gitlab.{{ ECORP_DNS_CORE_ZONE_NAME }}"
    api_token: "SUPER_SECRET_ROOT_TOKEN"
    name: "{{ repo.repo }}"
    group: "{{ repo.path }}"
    visibility: public
    state: present
    validate_certs: false