- name: Check if steps.yml has changed
  ansible.builtin.stat:
    path: /ecorp/data/controller/last_steps.yml
  register: last_steps_stat

- name: Read current steps.yml
  ansible.builtin.slurp:
    src: /ecorp/settings/steps.yml
  register: current_steps_content

- name: Read last successfull steps.yml if it exists
  ansible.builtin.slurp:
    src: /ecorp/data/controller/last_steps.yml
  register: last_steps_content
  when: last_steps_stat.stat.exists

- name: Set fact if steps.yml has changed
  ansible.builtin.set_fact:
    steps_changed: "{{ not last_steps_stat.stat.exists or (current_steps_content.content | b64decode) != (last_steps_content.content | b64decode) }}"

- name: "Include steps definitions"
  include_vars:
    file: /ecorp/settings/steps.yml
  when: steps_changed

- name: Run steps.yml if it has changed
  include_role:
    name: "step/{{ item.step }}"
    apply:
      vars: "{{ item }}"
  loop: "{{ steps }}"
  when: steps_changed
  
- name: Copy current ad-users.yml to last_imports if it was imported
  ansible.builtin.copy:
    src: /ecorp/settings/steps.yml
    dest: /ecorp/data/controller/last_steps.yml
    remote_src: false
  when: steps_changed