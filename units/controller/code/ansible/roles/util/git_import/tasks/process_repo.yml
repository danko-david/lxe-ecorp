---
- name: Set repository facts
  ansible.builtin.set_fact:
    repo_local_path: "/ecorp/data/git_repos/{{ current_repo.path | default('') }}/{{ current_repo.repo }}"
    gitlab_namespace: "{{ current_repo.path | replace('.', '/') }}"
    gitlab_project_name: "{{ current_repo.repo }}"
    gitlab_repo_url: "{{ gitlab_url }}/{{ current_repo.path | replace('.', '/') }}/{{ current_repo.repo }}.git"

- name: Ensure local repository directory exists
  ansible.builtin.file:
    path: "{{ repo_local_path }}"
    state: directory
    mode: '0755'

- name: Clone or pull main repository {{ current_repo.url }}
  ansible.builtin.git:
    repo: "{{ current_repo.url }}"
    dest: "{{ repo_local_path }}"
    version: master # or a specific branch/tag
    update: yes
    force: yes # Use with caution, can discard local changes
  register: git_clone_result

- name: Create GitLab namespace {{ gitlab_namespace }}
  ansible.builtin.uri:
    url: "{{ gitlab_url }}/api/v4/namespaces?private_token={{ gitlab_private_token }}"
    method: POST
    body_format: json
    body:
      name: "{{ gitlab_namespace }}"
      path: "{{ gitlab_namespace }}"
    status_code: [201, 409] # 201 Created, 409 Conflict (if already exists)
    headers:
      "PRIVATE-TOKEN": "{{ gitlab_private_token }}"
  register: gitlab_namespace_creation
  when: gitlab_namespace != ""

- name: Create GitLab project {{ gitlab_project_name }} in namespace {{ gitlab_namespace }}
  ansible.builtin.uri:
    url: "{{ gitlab_url }}/api/v4/projects?private_token={{ gitlab_private_token }}"
    method: POST
    body_format: json
    body:
      name: "{{ gitlab_project_name }}"
      path: "{{ gitlab_project_name }}"
      namespace_id: "{{ gitlab_namespace_creation.json.id | default(omit) }}" # Use namespace ID if created, otherwise assume it exists
      visibility: private # or public, internal
    status_code: [201, 409] # 201 Created, 409 Conflict (if already exists)
    headers:
      PRIVATE-TOKEN: "{{ gitlab_private_token }}"
  register: gitlab_project_creation

- name: Add GitLab remote to local repository
  ansible.builtin.command:
    cmd: git remote add gitlab "{{ gitlab_repo_url }}"
    chdir: "{{ repo_local_path }}"
  ignore_errors: yes # Remote might already exist

- name: Push main repository to GitLab
  ansible.builtin.command:
    cmd: git push --set-upstream gitlab master
    chdir: "{{ repo_local_path }}"
  when: git_clone_result.changed # Only push if there were changes or it was cloned