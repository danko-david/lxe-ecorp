stages:
  - test

autotest-default-install:
  stage: test
  image: docker:dind
  rules:
    # 1. If the variable is present, run automatically
    - if: $PIPE_AUTOTEST
      when: always
    # 2. Fallback: make the job manual
    - when: manual
  script: |
    apk add --no-cache bash grep

    # Prepare environment
    if [ ! -z $CATCH_CONTROL ] ; then tail -f /dev/null; fi
    ./ecorp ci_test_infra
