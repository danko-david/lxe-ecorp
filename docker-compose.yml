
x-def: &def
  restart: unless-stopped
  networks:
    core:
  dns:
    # Yes, we use DC as DNS of course
    - ${NET_DC}

services:
  dns:
    image: coredns/coredns
    restart: unless-stopped
    entrypoint: /coredns -conf /dns/Corefile
    volumes:
      # zone configurations
      - ./data/dns/:/dns/
    networks:
      core:
        ipv4_address: ${NET_DNS}

  dc:
    <<: *def
    privileged: true # required to manage file ACLs
    hostname: dc.${DC_DOMAIN}
    build:
      context: units/dc
    environment:
      - DC_DNS_FORWARDER=${NET_DNS}
      - DC_REALM
      - DC_DOMAIN
      - DC_ADMIN_PASS
    # can't bind mount with acl support, so I use a volume
    volumes:
      - dc:/var/lib/samba/
    networks:
      core:
        ipv4_address: ${NET_DC}

  controller:
    <<: *def
    build:
      context: units/controller
    environment:
      - DNS_CORE_ZONE_NAME
      - DC_REALM
      - DC_DOMAIN
      - DC_ADMIN_PASS
    volumes:
      - ./:/ecorp
      - ./data/controller/root:/root
      - /var/run/docker.sock:/var/run/docker.sock

  gitlab:
    <<: *def
    image: 'gitlab/gitlab-ce:latest'
    environment:
      - GITLAB_ROOT_PASSWORD
    volumes:
      - ./data/gitlab/config:/etc/gitlab
      - ./data/gitlab/logs:/var/log/gitlab
      - ./data/gitlab/data:/var/opt/gitlab

  core-gitlab-runner:
    <<: *def
    image: gitlab/gitlab-runner:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/gitlab-runner/conf:/etc/gitlab-runner

  www:
    <<: *def
    build:
      context: units/www
    labels:
      # extra dns record to this container
      dns_names: "collab chat ticket *.all"
      # extra record used to generate virtual server
      ingress: "collab|mattermost:8065"


  mattermost:
    <<: *def
    image: mattermost/mattermost-preview
    volumes:
      - ./data/mattermost/data:/mm/mattermost-data

#//- dns _for_ dns server for name resolution
#- samba _for_ AD functionalities
#- samba _for_ fileshare
#//- gitlab _for_ code management and CI/CD
#- redmine _for_ ticketing 
#- nexus _for_ package management and external package mirroring
#- nextcloud/mattermost _for_ teams and sharepoint alternative

volumes:
  # I dont like this, but ACLs does not works with bind
  dc:

networks:
  core:
    ipam:
      driver: default
      config:
        - subnet: ${NET_CIDR} 